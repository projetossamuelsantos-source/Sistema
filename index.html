<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>Siafauna</title> <script src="https://cdn.tailwindcss.com"></script> </head> <body class="bg-slate-100 min-h-screen p-6"> <!-- LOGIN --> <div id="loginTela" class="min-h-screen flex items-center justify-center" > <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md" > <h1 class="text-3xl font-bold text-center mb-6"> Plataforma Siafauna </h1> <input id="usuario" type="text" placeholder="Usuário" class="w-full border border-slate-300 rounded-xl p-4 mb-4" /> <input id="senha" type="password" placeholder="Senha" class="w-full border border-slate-300 rounded-xl p-4" /> <button id="btnEntrar" type="button" class="w-full mt-5 bg-slate-900 text-white rounded-xl py-4" > Entrar </button> </div> </div> <!-- NOME --> <div id="nomeTela" class="hidden min-h-screen items-center justify-center" > <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md" > <h2 class="text-2xl font-bold text-center mb-5"> Nome do Usuário </h2> <input id="nomeUsuario" type="text" placeholder="Digite seu nome" class="w-full border border-slate-300 rounded-xl p-4" /> <button id="btnContinuar" type="button" class="w-full mt-5 bg-slate-900 text-white rounded-xl py-4" > Continuar </button> </div> </div> <!-- SISTEMA --> <div id="sistema" class="hidden max-w-7xl mx-auto space-y-6" > <!-- TOPO --> <div class="bg-white rounded-3xl shadow-xl p-6"> <div class="flex justify-between items-center"> <div> <h1 class="text-4xl font-bold text-slate-800"> Plataforma Siafauna </h1> <p class="text-slate-500 mt-2"> Sistema colaborativo compartilhado </p> </div> <div class="text-right"> <div class="text-slate-500 text-sm"> Usuário: <span id="usuarioLogado" class="font-bold" ></span> </div> <button id="btnSair" class="mt-3 bg-red-500 text-white px-4 py-2 rounded-xl" > Sair </button> </div> </div> </div> <!-- SWOT --> <div class="grid grid-cols-1 md:grid-cols-2 gap-5"> <!-- OPORTUNIDADES --> <div class="bg-white rounded-3xl shadow-xl p-5"> <h2 class="text-2xl font-bold mb-4 text-green-600"> Oportunidades </h2> <textarea id="oportunidades" class="w-full border border-slate-300 rounded-xl p-4 h-40" ></textarea> <button onclick="salvarItem('Oportunidade', 'oportunidades')" class="w-full mt-4 bg-green-600 text-white py-3 rounded-xl" > Salvar Oportunidade </button> </div> <!-- AMEAÇAS --> <div class="bg-white rounded-3xl shadow-xl p-5"> <h2 class="text-2xl font-bold mb-4 text-red-600"> Ameaças </h2> <textarea id="ameacas" class="w-full border border-slate-300 rounded-xl p-4 h-40" ></textarea> <button onclick="salvarItem('Ameaça', 'ameacas')" class="w-full mt-4 bg-red-600 text-white py-3 rounded-xl" > Salvar Ameaça </button> </div> <!-- FORÇAS --> <div class="bg-white rounded-3xl shadow-xl p-5"> <h2 class="text-2xl font-bold mb-4 text-blue-600"> Forças </h2> <textarea id="forcas" class="w-full border border-slate-300 rounded-xl p-4 h-40" ></textarea> <button onclick="salvarItem('Força', 'forcas')" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-xl" > Salvar Força </button> </div> <!-- FRAQUEZAS --> <div class="bg-white rounded-3xl shadow-xl p-5"> <h2 class="text-2xl font-bold mb-4 text-yellow-600"> Fraquezas </h2> <textarea id="fraquezas" class="w-full border border-slate-300 rounded-xl p-4 h-40" ></textarea> <button onclick="salvarItem('Fraqueza', 'fraquezas')" class="w-full mt-4 bg-yellow-500 text-white py-3 rounded-xl" > Salvar Fraqueza </button> </div> </div> <!-- COMENTÁRIOS --> <div class="bg-white rounded-3xl shadow-xl p-6"> <h2 class="text-2xl font-bold mb-4"> Comentários </h2> <textarea id="comentario" placeholder="Digite um comentário" class="w-full border border-slate-300 rounded-xl p-4 h-32" ></textarea> <button onclick="salvarItem('Comentário', 'comentario')" class="mt-4 bg-slate-900 text-white px-6 py-3 rounded-xl" > Enviar Comentário </button> </div> <!-- HISTÓRICO --> <div class="bg-white rounded-3xl shadow-xl p-6"> <div class="flex justify-between items-center mb-5"> <h2 class="text-2xl font-bold"> Histórico de Eventos </h2> <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-3 rounded-xl" > Salvar PDF </button> </div> <div id="historico" class="space-y-4" ></div> </div> </div> <script> let usuarioAtual = ''; const LOGIN_USUARIO = 'siafauna'; const LOGIN_SENHA = '1234@'; window.addEventListener('load', () => { const loginSalvo = sessionStorage.getItem('siafauna_login'); const usuarioSalvo = sessionStorage.getItem('siafauna_usuario'); if ( loginSalvo === 'true' && usuarioSalvo ) { usuarioAtual = usuarioSalvo; document.getElementById( 'usuarioLogado' ).innerText = usuarioAtual; abrirSistema(); } carregarHistoricoServidor(); setInterval( carregarHistoricoServidor, 3000 ); }); document .getElementById('btnEntrar') .addEventListener('click', fazerLogin); document .getElementById('btnContinuar') .addEventListener('click', entrarSistema); document .getElementById('btnSair') .addEventListener('click', logout); function fazerLogin() { const usuario = document .getElementById('usuario') .value .trim() .toLowerCase(); const senha = document .getElementById('senha') .value .trim(); if ( usuario === LOGIN_USUARIO && senha === LOGIN_SENHA ) { document.getElementById( 'loginTela' ).style.display = 'none'; const nomeTela = document.getElementById('nomeTela'); nomeTela.classList.remove('hidden'); nomeTela.style.display = 'flex'; } else { alert( 'Usuário ou senha incorretos' ); } } function entrarSistema() { const nome = document .getElementById('nomeUsuario') .value .trim(); if (!nome) { alert('Digite seu nome'); return; } usuarioAtual = nome; sessionStorage.setItem( 'siafauna_login', 'true' ); sessionStorage.setItem( 'siafauna_usuario', nome ); document.getElementById( 'usuarioLogado' ).innerText = nome; abrirSistema(); } function abrirSistema() { document.getElementById( 'loginTela' ).style.display = 'none'; document.getElementById( 'nomeTela' ).style.display = 'none'; const sistema = document.getElementById('sistema'); sistema.classList.remove('hidden'); sistema.style.display = 'block'; } function logout() { sessionStorage.clear(); location.reload(); } async function salvarItem( tipo, campo ) { const campoTexto = document.getElementById(campo); if (!campoTexto) { alert('Campo não encontrado'); return; } const texto = campoTexto.value.trim(); if (!texto) { alert('Digite algo'); return; } const item = { tipo: tipo, texto: texto, usuario: usuarioAtual, data: new Date() .toLocaleString('pt-BR') }; try { const resposta = await fetch( 'salvar.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(item) } ); if (!resposta.ok) { throw new Error( 'Erro ao salvar' ); } campoTexto.value = ''; carregarHistoricoServidor(); } catch (erro) { console.error(erro); alert( 'Erro ao salvar dados. Verifique se salvar.php existe.' ); } } async function carregarHistoricoServidor() { try { const resposta = await fetch( 'carregar.php?t=' + Date.now() ); const dados = await resposta.json(); const historico = document.getElementById( 'historico' ); historico.innerHTML = ''; dados.forEach((item) => { const div = document.createElement('div'); div.className = 'bg-slate-100 rounded-2xl p-4'; div.innerHTML = ` <div class="font-bold text-slate-700 mb-2"> ${item.tipo} </div> <div class="text-slate-800 whitespace-pre-wrap mb-3"> ${item.texto} </div> <div class="text-sm text-slate-500"> ${item.usuario} </div> <div class="text-xs text-slate-400 mt-1"> ${item.data} </div> `; historico.appendChild(div); }); } catch (erro) { console.error(erro); } } document.addEventListener( 'keydown', function(e) { if ( e.key === 'Enter' && document .getElementById('loginTela') .style.display !== 'none' ) { fazerLogin(); } } ); </script> </body> </html>
